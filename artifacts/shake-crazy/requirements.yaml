packages:
  "gsap": "For high-performance scroll and entrance animations"
  "canvas-confetti": "For celebrating the 10-second stopwatch challenge winners"
  "@types/canvas-confetti": "Types for canvas-confetti"
  "recharts": "For the admin analytics dashboard charts"
  "date-fns": "For elegant date formatting across the app"
  "framer-motion": "For page transitions and complex UI layout animations"
  "@hookform/resolvers": "For Zod form validation"
  "react-hook-form": "For performant forms in the admin panel and submissions"
  "zod": "For schema validation on forms"

images:
  - path: "artifacts/shake-crazy/public/images/hero-truck.png"
    description: "A highly stylized, modern vector illustration of a red and yellow food truck. Vibrant, playful street food energy. Transparent background if possible."
    aspect_ratio: "16:9"
  - path: "artifacts/shake-crazy/public/images/food-pattern.png"
    description: "An abstract, repeating background pattern featuring subtle minimalist outlines of burgers, milkshakes, fries, and pizzas in warm monochromatic yellow tones."
    aspect_ratio: "16:9"

notes:
  - "The API client is generated by Orval and available at @workspace/api-client-react."
  - "Admin authentication relies on a JWT stored in localStorage under 'shake_crazy_token'."
  - "Since we cannot modify customFetch directly, we inject headers dynamically in the Orval hook options using a request helper."
